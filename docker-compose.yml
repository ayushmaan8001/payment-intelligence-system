version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: payment_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: payment_intelligence
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: payment_api
    restart: always
    ports:
      - "8001:8001"
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

networks:
  default:
    name: payment_network

volumes:
  mysql_data: